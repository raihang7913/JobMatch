name: Deploy to Server

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install cloudflared
        run: |
          curl -fsSL https://github.com/cloudflare/cloudflared/releases/latest/download/cloudflared-linux-amd64 -o /usr/local/bin/cloudflared
          chmod +x /usr/local/bin/cloudflared

      - name: Setup SSH key
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.SSH_PRIVATE_KEY }}" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key

      - name: Deploy via Cloudflare Tunnel
        run: |
          ssh -o StrictHostKeyChecking=no \
              -o ProxyCommand="cloudflared access ssh --hostname ssh.muu.my.id" \
              -i ~/.ssh/deploy_key \
              raihan@ssh.muu.my.id << 'DEPLOY'
            echo "=== Starting deploy ==="

            # Clone repo if not exists
            if [ ! -d ~/job-search-app ]; then
              echo "Cloning repo..."
              cd ~
              git clone https://github.com/raihang7913/JobMatch.git job-search-app
            fi

            cd ~/job-search-app
            echo "Pulling latest code..."
            git pull origin main

            # Install Node.js if not present
            if ! command -v npm &> /dev/null; then
              echo "Installing Node.js..."
              curl -fsSL https://deb.nodesource.com/setup_20.x | sudo -E bash -
              sudo apt install -y nodejs
            fi

            echo "Node version: $(node --version)"
            echo "NPM version: $(npm --version)"

            # Backend
            echo "=== Setting up backend ==="
            cd backend
            rm -rf venv
            python3 -m venv venv
            ./venv/bin/pip install --upgrade pip -q
            ./venv/bin/pip install -r requirements.txt -q

            echo "Restarting backend..."
            pkill -f "python main.py" || true
            sleep 2
            nohup ./venv/bin/python main.py > /tmp/backend.log 2>&1 &
            sleep 3
            curl -s http://localhost:8000/api/stats || echo "Backend check..."

            # Frontend
            echo "=== Setting up frontend ==="
            cd ../frontend
            npm install --silent
            npm run build

            echo "Restarting frontend..."
            pkill -f "serve -s dist" || true
            sleep 2
            nohup npx serve -s dist -l 3000 > /tmp/frontend.log 2>&1 &
            sleep 3

            echo "=== Deploy complete! ✅ ==="
            ss -tlnp | grep -E "8000|3000"
          DEPLOY
