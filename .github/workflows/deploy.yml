name: Deploy to Server

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install cloudflared
        run: |
          curl -fsSL https://github.com/cloudflare/cloudflared/releases/latest/download/cloudflared-linux-amd64 -o /usr/local/bin/cloudflared
          chmod +x /usr/local/bin/cloudflared

      - name: Setup SSH key
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.SSH_PRIVATE_KEY }}" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key

      - name: Deploy via Cloudflare Tunnel
        run: |
          ssh -o StrictHostKeyChecking=no \
              -o ProxyCommand="cloudflared access ssh --hostname ssh.muu.my.id" \
              -i ~/.ssh/deploy_key \
              raihan@ssh.muu.my.id << 'DEPLOY'
            echo "=== Starting deploy ==="

            cd ~/job-search-app
            echo "Pulling latest code..."
            git pull origin main

            echo "=== Building and starting Docker containers ==="
            docker compose down || true
            docker compose up -d --build

            sleep 5
            echo "=== Container status ==="
            docker compose ps

            echo "=== Health check ==="
            curl -s http://localhost:8001/ || echo "Backend check..."
            curl -s http://localhost:3001/ | head -1 || echo "Frontend check..."

            echo "=== Deploy complete! ✅ ==="
          DEPLOY
