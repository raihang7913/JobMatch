services:
  backend:
    build: ./backend
    container_name: jobmatch-backend
    restart: unless-stopped
    ports:
      - "8001:8001"
    volumes:
      - uploads:/app/uploads

  frontend:
    build: ./frontend
    container_name: jobmatch-frontend
    restart: unless-stopped
    ports:
      - "3001:3000"
    depends_on:
      - backend

volumes:
  uploads:
